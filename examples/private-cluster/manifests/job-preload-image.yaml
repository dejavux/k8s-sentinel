# One-shot: preload k8s-sentinel image on workers via host crictl/ctr (plain HTTP).
# Remove after CronJob pulls succeed, or keep until ansible mirror is applied on all nodes.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: k8s-sentinel-preload-image
  namespace: kube-system
  labels:
    app: k8s-sentinel-preload
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: k8s-sentinel-preload
    spec:
      hostPID: true
      hostNetwork: true
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu
                    operator: NotIn
                    values:
                      - "true"
      containers:
        - name: preload
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
            - |
              set -e
              REG="${REGISTRY_ENDPOINT:-10.101.22.227:5000}"
              IMG="${REG}/k8s-sentinel:${SENTINEL_TAG:-v0.1.0-dev}"
              apk add --no-cache curl >/dev/null
              curl -sf "http://${REG}/v2/" >/dev/null
              echo "Preloading ${IMG} on node $(hostname)..."
              if nsenter -t 1 -m -u -i -n -- crictl pull "${IMG}" 2>/dev/null; then
                echo "crictl pull ok"
              elif nsenter -t 1 -m -u -i -n -- ctr -n k8s.io images pull --plain-http "${IMG}"; then
                echo "ctr pull ok"
              else
                echo "pull failed" >&2
                exit 1
              fi
              nsenter -t 1 -m -u -i -n -- crictl images | grep k8s-sentinel || true
          env:
            - name: REGISTRY_ENDPOINT
              value: "10.101.22.227:5000"
            - name: SENTINEL_TAG
              value: "v0.1.0-dev"
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-root
              mountPath: /host
      volumes:
        - name: host-root
          hostPath:
            path: /
