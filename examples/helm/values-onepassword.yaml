# 1Password Operator overlay (optional)
# Requires 1Password Connect Operator in cluster.
# helm upgrade --install k8s-sentinel ./charts/k8s-sentinel -f examples/helm/values-onepassword.yaml -n kube-system

onepassword:
  enabled: true
  itemPath: vaults/YourVault/items/k8s-sentinel-credentials

secrets:
  create: false
  existingSecret: k8s-sentinel-secrets

gitops:
  enabled: true
  githubRepo: your-org/your-infra-repo

config:
  autoFix: true
  autoPR: true
