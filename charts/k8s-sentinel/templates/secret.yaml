{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) (not .Values.onepassword.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "k8s-sentinel.secretName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "k8s-sentinel.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.cursorApiKey }}
  cursor-api-key: {{ .Values.secrets.cursorApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.githubToken }}
  github-token: {{ .Values.secrets.githubToken | quote }}
  {{- end }}
{{- end }}
