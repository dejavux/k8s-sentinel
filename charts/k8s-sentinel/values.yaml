# Default values — safe for public / check-only installs.
# See examples/helm/ for full-feature overlays.

nameOverride: ""
fullnameOverride: ""

namespace: kube-system

image:
  repository: ghcr.io/dejavux/k8s-sentinel
  tag: v0.2.10
  pullPolicy: IfNotPresent

schedule: "*/30 * * * *"
concurrencyPolicy: Forbid
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 3
startingDeadlineSeconds: 300
ttlSecondsAfterFinished: 86400
activeDeadlineSeconds: 2700
backoffLimit: 0

command: check

config:
  modules: runc,disk,pods,components,containerd,kubelet,resources,cronjobs
  autoFix: false
  autoPR: false
  autoMerge: false
  maxOpenPrs: 1
  gitopsModules: pods
  cursorArchive: true
  telegramNotify: false
  diskWarnPercent: 75
  diskErrorPercent: 85
  diskWarnFail: true
  diskAnsible: false
  containerdAnsible: true
  # Set when using monorepo playbooks (optional; bundled playbooks use packageRoot)
  infraRoot: ""
  packageRoot: /app
  outputFile: /workspace/sentinel-results.json
  metricsFile: ""
  pushgatewayUrl: ""
  pushgatewayJob: k8s-sentinel
  cursorAgentModel: ""
  cursorModel: ""

ansible:
  enabled: false
  inventoryConfigMap: ""
  inventoryContent: ""
  sshSecret: k8s-sentinel-ansible-ssh
  remoteUser: ""
  hostKeyChecking: "False"
  sshArgs: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o IdentitiesOnly=yes"
  hostNetwork: false

secrets:
  existingSecret: ""
  create: false
  cursorApiKey: ""
  githubToken: ""

onepassword:
  enabled: false
  # Example: vaults/MyVault/items/k8s-sentinel-credentials
  itemPath: ""

gitops:
  enabled: false
  githubRepo: ""
  gitAuthorName: K8s Sentinel Bot
  gitAuthorEmail: sentinel@example.local
  gitCommitterName: K8s Sentinel Bot
  gitCommitterEmail: sentinel@example.local
  nodeOptions: "--max-old-space-size=1024"

registry:
  endpoint: ""
  svcHost: ""

resources:
  requests:
    cpu: 100m
    memory: 512Mi
    ephemeral-storage: 512Mi
  limits:
    cpu: 500m
    memory: 1536Mi
    ephemeral-storage: 3Gi

workspace:
  sizeLimit: 1Gi

serviceAccount:
  create: true
  name: k8s-sentinel
  annotations: {}

rbac:
  create: true

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: nvidia.com/gpu
              operator: NotIn
              values:
                - "true"
            - key: node.kubernetes.io/disk-pressure
              operator: DoesNotExist

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: k8s-sentinel
