# 3q.fi production cluster overlay (private repo phase; mirrors legacy deploy.sh / CronJob).

image:
  repository: registry.docker-registry-internal.svc.cluster.local:5000/k8s-sentinel
  tag: v0.1.0-dev
  pullPolicy: IfNotPresent

config:
  autoFix: true
  autoPR: true
  autoMerge: true
  diskAnsible: true
  containerdAnsible: true
  infraRoot: /workspace/infra-bootstrap

ansible:
  enabled: true
  inventoryConfigMap: k8s-sentinel-ansible-inventory
  sshSecret: k8s-sentinel-ansible-ssh
  remoteUser: light0

onepassword:
  enabled: true
  itemPath: vaults/Infra-CI/items/k8s-sentinel-credentials

gitops:
  enabled: true
  githubRepo: dejavux/infra-bootstrap
  gitAuthorEmail: sentinel@infra-bootstrap.local
  gitCommitterEmail: sentinel@infra-bootstrap.local

registry:
  endpoint: "10.101.22.227:5000"
