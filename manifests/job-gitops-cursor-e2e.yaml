---
# Live Cursor SDK E2E — cloud Agent on Cursor VM (not local executor in pod).
# Requires image >= v0.2.7 (cursor-agent-runtime.ts + pr_creator npx fix).
#
# Usage:
#   kubectl apply -f manifests/job-gitops-cursor-e2e.yaml
#   kubectl logs -n kube-system -l phase=gitops-cursor-e2e -c e2e -f
#   kubectl delete job k8s-sentinel-gitops-cursor-e2e -n kube-system
apiVersion: batch/v1
kind: Job
metadata:
  name: k8s-sentinel-gitops-cursor-e2e
  namespace: kube-system
  labels:
    app: k8s-sentinel
    phase: gitops-cursor-e2e
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: k8s-sentinel
        phase: gitops-cursor-e2e
    spec:
      serviceAccountName: k8s-sentinel
      restartPolicy: Never
      containers:
        - name: e2e
          image: 10.101.22.227:5000/k8s-sentinel:v0.2.7
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - /app/scripts/smoke/gitops_e2e.py
            - --with-cursor
          env:
            - name: SENTINEL_PACKAGE_ROOT
              value: /app
            - name: SENTINEL_GITHUB_REPO
              value: dejavux/infra-bootstrap
            - name: CURSOR_AGENT_RUNTIME
              value: cloud
            - name: CURSOR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: k8s-sentinel-secrets
                  key: cursor-api-key
            - name: CURSOR_AGENT_MODEL
              value: default
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1536Mi
