---
# K8s Sentinel Secrets - 管理透過 1Password Operator
# 需在 Infra-CI vault 建立 item: k8s-sentinel-credentials

apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: k8s-sentinel-secrets
  namespace: kube-system
  labels:
    app: k8s-sentinel
    component: secrets
spec:
  itemPath: "vaults/Infra-CI/items/k8s-sentinel-credentials"

---
# 使用說明：
#
# 1. 在 1Password Infra-CI vault 建立 item: k8s-sentinel-credentials
#
# 2. 欄位設定：
#    - cursor-api-key (password): Cursor SDK API Key（可選）
#    - github-token (password): GitHub Personal Access Token
#        - Scopes: repo, workflow
#        - 用於建立 PR 和 commit
#
# 3. 部署此 CR：
#    kubectl apply -f 1password-items.yaml
#
# 4. 驗證 Secret 已建立：
#    kubectl get secret k8s-sentinel-secrets -n kube-system
#    kubectl get secret k8s-sentinel-secrets -n kube-system -o jsonpath='{.data}'
#
# 5. Secret 欄位映射：
#    - cursor-api-key → .data.cursor-api-key (base64)
#    - github-token → .data.github-token (base64)
